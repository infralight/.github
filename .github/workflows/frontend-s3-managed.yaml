name: Reusable Frontend Build

on:
  workflow_call:
    inputs:
      node-version:
        default: '16.20.0'
        required: false
        type: string
      custom:
        type: boolean
        required: false
        default: false
      run-tests:
        type: boolean
        required: false
        default: true
      trivy-scan:
        type: boolean
        required: false
        default: false
      branch:
        type: string
        required: true
      environment:
        type: string
        default: 'dev'
        required: false
      slack:
        type: boolean
        default: true
        required: false
    secrets:
      CI_AWS_CRED_KEY:
        required: false
      CI_AWS_CRED_SECRET:
        required: false
      CI_REGION:
        required: true
      CI_ACCOUNT_ID:
        required: true
      CI_BACKEND_URL:
        required: true
      CI_AUTH0_CLIENT_ID:
        required: true
      CI_AUTH0_DOMAIN:
        required: true
      CI_FRONTEND_BUCKET:
        required: true
      CI_SLACK_WEBHOOK:
        required: true
      CI_DISTRIBUTION_ID:
        required: true
      CI_AZURE_DEVOPS_CLIENT_ID:
        required: true
      CI_GROWTHBOOK_CLIENT_ID:
        required: false
      CI_GROWTHBOOK_DECRYPTION_KEY:
        required: false
      CI_LOGROCKET_API_KEY:
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  build:
    environment: ${{ inputs.environment }}
    name: "Frontend - Build & Deploy"
    runs-on: [self-hosted, frontend, "${{ inputs.environment }}"]
    timeout-minutes: 30
    steps:
      - name: Git Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Edit config.js
        run: ./scripts/set_vars.sh
        shell: bash
        env:
          AUTH0_CLIENT_ID: ${{ secrets.CI_AUTH0_CLIENT_ID }}
          AUTH0_DOMAIN: ${{ secrets.CI_AUTH0_DOMAIN }}
          AUTH0_NS: https://infralight.co
          AUTH0_AUDIENCE: infralight-api
          BACKEND_URL: ${{ secrets.CI_BACKEND_URL }}
          NEXUS_API_URL: ${{ vars.CI_NEXUS_API_URL }}
          SSO_DOMAINS_OKTA: ${{ vars.SSO_DOMAINS_OKTA }}
          SSO_DOMAINS_AZURE: ${{ vars.SSO_DOMAINS_AZURE }}
          SSO_DOMAINS_PING: ${{ vars.SSO_DOMAINS_PING }}
          SSO_DOMAINS_ONE: ${{ vars.SSO_DOMAINS_ONE }}
          AZURE_DEVOPS_CLIENT_ID: ${{ secrets.CI_AZURE_DEVOPS_CLIENT_ID }}
          GITHUB_APP_LINK: ${{ vars.CI_GITHUB_APP_LINK }}
          GROWTHBOOK_CLIENT_ID: ${{ secrets.CI_GROWTHBOOK_CLIENT_ID }}
          GROWTHBOOK_DECRYPTION_KEY: ${{ secrets.CI_GROWTHBOOK_DECRYPTION_KEY }}

      - name: "Setup Node ${{ inputs.node-version }}"
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: ${{ inputs.node-version }}

      - name: Node Cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        id: npm-cache
        with:
          path: |
            **/node_modules
            **/.eslintcache
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Export Global Env Variables
        run: |
          echo "RELEASE_VERSION=${GITHUB_SHA::6}" >> $GITHUB_ENV
          echo "HUSKY=0" >> $GITHUB_ENV

      - name: Set K8S API URL (Prod) # TODO: Check if still in-use
        if: inputs.environment == 'prod'
        run: |
          echo "K8S_API=https://k8s-api.prod.external.api.infralight.cloud" >> $GITHUB_ENV

      - name: Install Dependencies
        run: npm ci

      - name: Run Jest Tests
        if: inputs.run-tests
        run: |
          npm test -- --watchAll=false --forceExit --maxWorkers="${JEST_MAX_WORKERS:-2}"

      - name: Frontend Build (npm)
        env:
          CI: "false"
          NODE_OPTIONS: "--max-old-space-size=8192"
          GENERATE_SOURCEMAP: ${{ inputs.environment == 'prod' && 'true' || 'false' }}
          REACT_APP_RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: npm run build

      - name: LogRocket Create Release and Upload Source Maps
        if: inputs.environment == 'prod'
        env:
          LOGROCKET_API_KEY: ${{ secrets.CI_LOGROCKET_API_KEY }}
        run: |
          npx logrocket-cli release ${{ env.RELEASE_VERSION }} \
            --project duddjo/firefly \
            --apikey $LOGROCKET_API_KEY \
            --verbose
          npx logrocket-cli upload build/static/js/*.map \
            --release ${{ env.RELEASE_VERSION }} \
            --project duddjo/firefly \
            --apikey $LOGROCKET_API_KEY \
            --urlPrefix "~/static/js/" \
            --verbose

      - name: Cleanup Source Maps
        run: |
          find build -name "*.map" -type f -delete

      - name: Install AWS Cli
        if: ${{ !contains(runner.name, 'GitHub Actions') }}
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          rm /tmp/awscliv2.zip
          sudo /tmp/aws/install --update
          rm -rf /tmp/aws/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        env:
          environment: ${{ startsWith(inputs.environment, 'env') && 'dev' || inputs.environment }}
        with:
          role-to-assume: arn:aws:iam::${{ secrets.CI_ACCOUNT_ID }}:role/${{ env.environment }}-github-actions-oidc
          role-session-name: runner
          aws-region: ${{ secrets.CI_REGION }}

      - name: Upload Files to S3
        env:
          AWS_REGION: ${{ secrets.CI_REGION }}
          AWS_S3_BUCKET: ${{ secrets.CI_FRONTEND_BUCKET }}
        run: |
          aws s3 sync build s3://$AWS_S3_BUCKET \
            --acl public-read \
            --follow-symlinks \
            --exclude 'files/*' \
            --exclude 'build/index.html' \
            --region $AWS_REGION
          aws s3 cp build/index.html s3://$AWS_S3_BUCKET/index.html \
            --acl public-read \
            --cache-control "no-cache, no-store, must-revalidate" \
            --region $AWS_REGION

      - name: Invalidate Cloudfront
        uses: docker://public.ecr.aws/firefly/cloudfront-invalidation:v0.0.5
        env:
          PATHS: '/*'
          AWS_REGION: ${{ secrets.CI_REGION }}
          DISTRIBUTION_ID: ${{ secrets.CI_DISTRIBUTION_ID }}

      - name: Slack Notification
        if: ${{ success() && inputs.slack }}
        uses: rtCamp/action-slack-notify@cdf0a2130cbcdfd82ba5fcac8e076370bf381b36 # v2
        env:
          SLACK_COLOR: ${{ job.status }} # or a specific color like 'green' or '#ff00ff'
          SLACK_ICON: https://assets-global.website-files.com/5d514fd9493b0575f03520bd/5d8e0b39fd776a3c238e8753_icons8_infinity_large_filled_2.svg
          SLACK_MESSAGE: "Frontend (${{ inputs.environment }}) env successfully deployed from ${{ github.ref }}"
          SLACK_TITLE: "Frontend (${{ inputs.environment }}) deployment notification"
          SLACK_USERNAME: cicdBot
          SLACK_WEBHOOK: ${{ secrets.CI_SLACK_WEBHOOK }}
