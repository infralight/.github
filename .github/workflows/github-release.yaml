name: Reusable Release

on:
  workflow_call:
    inputs:
      branch:
        type: string
        default: main
        required: true
    secrets:
      RELEASE_GITHUB_TOKEN:
        required: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24

      - name: Release
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6
        id: semantic
        with:
          semantic_version: 25.0.3
          extra_plugins: |
            @semantic-release/changelog@6.0.0
            @semantic-release/git@10.0.0
            conventional-changelog-conventionalcommits@4.6.3
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          
      - name: Get release version
        id: get_version
        run: |
          if [ "${{ steps.semantic.outputs.new_release_published }}" == "true" ]; then
            echo "version=${{ steps.semantic.outputs.new_release_version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ steps.semantic.outputs.last_release_version }}" >> $GITHUB_OUTPUT
          fi

      - name: Display Release Info
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          NEW_RELEASE="${{ steps.semantic.outputs.new_release_published }}"

          echo "::notice title=📦 Release Version::${VERSION}"

          echo "### 🚀 Release Information" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| New Release Published | ${NEW_RELEASE} |" >> $GITHUB_STEP_SUMMARY